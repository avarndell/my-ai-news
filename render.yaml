databases:
  - name: ainews-db
    databaseName: ainews
    user: ainews
    plan: free

services:
  - type: cron
    name: ai-news-pipeline
    runtime: docker
    region: virginia
    schedule: "0 7 * * *"
    dockerfilePath: ./Dockerfile
    envVars:
      - key: OPENAPI_API_KEY
        sync: false
      - key: OPENAPI_MODEL
        value: gpt-5.2
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: EMAIL_SENDER
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: ainews-db
          property: connectionString
